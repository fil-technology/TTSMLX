name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  swift-package:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve package
        run: swift package resolve

      - name: Build package
        run: swift build

      - name: Test package
        run: swift test

  demo-project:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate demo project
        working-directory: DemoApp
        run: xcodegen generate
